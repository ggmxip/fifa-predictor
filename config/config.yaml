data:
  raw_dir: data/raw
  processed_dir: data/processed
  external_dir: data/external

  sources:
    historical_matches: https://raw.githubusercontent.com/openfootball/world-cup/master/
    fifa_rankings: https://www.fifa.com/fifa-world-ranking/
    elo_ratings: https://www.eloratings.net/

features:
  rolling_window: 10
  recency_weight_decay: 0.9
  include_elo: true
  include_fifa_rank: true
  include_market_value: true
  include_squad_age: true
  include_head_to_head: true
  include_tournament_history: true
  include_qualification: true
  include_weather: false

models:
  xgboost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    gamma: 0.1
    random_state: 42
    early_stopping_rounds: 20

  lightgbm:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    random_state: 42
    early_stopping_rounds: 20

  random_forest:
    n_estimators: 300
    max_depth: 10
    min_samples_split: 10
    min_samples_leaf: 5
    random_state: 42

  neural_network:
    hidden_layers: [128, 64, 32]
    dropout: 0.3
    learning_rate: 0.001
    batch_size: 64
    epochs: 200
    patience: 20

  poisson:
    fit_method: MLE
    regularization: 0.01

  elo:
    initial_rating: 1500
    k_factor: 32
    home_advantage: 100
    regression_factor: 0.5

ensemble:
  meta_learner: logistic_regression
  cv_folds: 5
  use_calibration: true

simulation:
  n_monte_carlo: 500
  group_stage_only: true

evaluation:
  test_tournaments:
    - 2018
    - 2022
  metrics:
    - accuracy
    - log_loss
    - brier_score
    - roc_auc
